<div class="section app-container">
  <h2 class="section-title">Menú del Día</h2>

  @if (cargando()) {
    <div class="loading">Cargando menú...</div>
  } @else {
    <div class="chip-row">
      @for (cat of categorias(); track cat) {
        <button class="chip" [class.active]="categoriaActiva() === cat" (click)="setCategoria(cat)">
          {{ cat }}
        </button>
      }
    </div>

    <div class="menu-grid">
      @for (producto of productosFiltrados(); track producto.id) {
        <div class="menu-card">
          <div class="menu-card-img">
            <div class="menu-card-img-placeholder">🍽️</div>
          </div>
          <div class="menu-card-body">
            <div class="menu-card-name">{{ producto.name }}</div>
            @if (producto.description) {
              <div class="menu-card-desc">{{ producto.description }}</div>
            }
            <div class="menu-card-footer">
              <span class="menu-card-price">{{ formatPrecio(producto.price) }}</span>
              <button class="btn-add" (click)="addToCart(producto)">+</button>
            </div>
          </div>
        </div>
      }
    </div>
  }
</div>

<div class="page-spacer"></div>
