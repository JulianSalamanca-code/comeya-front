<div class="profile-header">
  <div class="app-container">
    <div class="profile-avatar-wrap">
      <div class="profile-avatar">👤</div>
    </div>
    <div class="profile-name">{{ perfil.fullName || perfil.nombre || 'Usuario' }}</div>
    <div class="profile-email">{{ perfil.email || 'correo@universidad.edu' }}</div>
  </div>
</div>

<div class="profile-body app-container">
  <div class="profile-menu-item" routerLink="/pedidos">
    <div class="pm-icon">📋</div>
    <span class="pm-label">Mis pedidos</span>
    <span class="pm-arrow">›</span>
  </div>
  <div class="profile-menu-item">
    <div class="pm-icon">💳</div>
    <span class="pm-label">Métodos de pago</span>
    <span class="pm-arrow">›</span>
  </div>
  <div class="profile-menu-item">
    <div class="pm-icon">🔔</div>
    <span class="pm-label">Notificaciones</span>
    <span class="pm-arrow">›</span>
  </div>
  <div class="profile-menu-item">
    <div class="pm-icon">⚙️</div>
    <span class="pm-label">Configuración</span>
    <span class="pm-arrow">›</span>
  </div>

  @if (api.isAdmin()) {
    <div class="profile-menu-item" routerLink="/admin">
      <div class="pm-icon">🛡️</div>
      <span class="pm-label">Administración</span>
      <span class="pm-arrow">›</span>
    </div>
  }

  <button class="btn-logout" (click)="logout()">Cerrar sesión</button>
</div>
