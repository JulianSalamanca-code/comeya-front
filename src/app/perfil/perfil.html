<div class="profile-header">
  <div class="app-container">
    <div class="profile-avatar-wrap">
      <div class="profile-avatar">👤</div>
    </div>
    <div class="profile-name">{{ perfil.name || perfil.nombre || 'Usuario' }}</div>
    <div class="profile-email">{{ perfil.email || '' }}</div>
    @if (rol) {
      <div class="profile-rol">{{ rol }}</div>
    }
  </div>
</div>

<div class="profile-body app-container">
  <div class="profile-menu-item" routerLink="/pedidos">
    <div class="pm-icon">📋</div>
    <span class="pm-label">Mis pedidos</span>
    <span class="pm-arrow">›</span>
  </div>
  <div class="profile-menu-item" routerLink="/forgot-password">
    <div class="pm-icon">🔑</div>
    <span class="pm-label">Cambiar contraseña</span>
    <span class="pm-arrow">›</span>
  </div>

  @if (api.isAdmin()) {
    <div class="profile-menu-item" routerLink="/admin">
      <div class="pm-icon">🛡️</div>
      <span class="pm-label">Administración</span>
      <span class="pm-arrow">›</span>
    </div>
  }

  <button class="btn-logout" (click)="logout()">Cerrar sesión</button>
</div>
