<div class="login-page">
  <div class="login-brand">
    <span class="login-logo">🍽️</span>
    <h1>Cafetería<br><em>Universitaria</em></h1>
    <p>ComeYa</p>
  </div>

  <div class="login-card">
    <div class="login-tabs">
      <a class="login-tab" routerLink="/login">Iniciar Sesión</a>
      <a class="login-tab active" routerLink="/register">Registrarse</a>
    </div>

    <div class="login-body">
      @if (error()) {
        <div class="form-error">{{ error() }}</div>
      }
      @if (exito()) {
        <div class="form-exito">{{ exito() }}</div>
      }

      <div class="form-group">
        <label>Nombre completo</label>
        <input type="text" placeholder="Nombres y apellidos" [(ngModel)]="nombre" />
      </div>
      <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" placeholder="correo@universidad.edu" [(ngModel)]="email" />
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" placeholder="Mínimo 6 caracteres" [(ngModel)]="contrasena" />
      </div>

      <button class="btn-primary" (click)="registrar()" [disabled]="cargando()">
        @if (cargando()) {
          Cargando...
        } @else {
          Crear cuenta
        }
      </button>
    </div>
  </div>
</div>
