<div class="login-page">
  <div class="login-brand">
    <span class="login-logo">🍽️</span>
    <h1>Cafetería<br><em>Universitaria</em></h1>
    <p>ComeYa</p>
  </div>

  <div class="login-card">
    <div class="login-tabs">
      <a class="login-tab active" routerLink="/login">Iniciar Sesión</a>
      <a class="login-tab" routerLink="/register">Registrarse</a>
    </div>

    <div class="login-body">
      @if (error()) {
        <div class="form-error">{{ error() }}</div>
      }

      <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" placeholder="correo@universidad.edu" [(ngModel)]="email" />
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" placeholder="••••••" [(ngModel)]="contrasena" />
      </div>

      <button class="btn-primary" (click)="iniciarSesion()" [disabled]="cargando()">
        @if (cargando()) {
          Cargando...
        } @else {
          Entrar
        }
      </button>

      <div class="forgot-link">
        <a routerLink="/forgot-password">¿Olvidaste tu contraseña?</a>
      </div>
    </div>
  </div>
</div>
