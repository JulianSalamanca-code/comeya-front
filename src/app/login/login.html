<div class="login-page">
  <div class="login-brand">
    <span class="login-logo">🍽️</span>
    <h1>Cafetería<br><em>Universitaria</em></h1>
    <p>ComeYa</p>
  </div>

  <div class="login-card">
    <div class="login-tabs">
      <button class="login-tab" [class.active]="tabActivo === 'login'" (click)="tabActivo = 'login'">Iniciar Sesión</button>
      <button class="login-tab" [class.active]="tabActivo === 'registro'" (click)="tabActivo = 'registro'">Registrarse</button>
    </div>

    @if (tabActivo === 'login') {
      <div class="login-body">
        @if (error()) {
          <div class="form-error">{{ error() }}</div>
        }

        <div class="form-group">
          <label>Usuario</label>
          <input type="text" placeholder="usuario" [(ngModel)]="usuario" />
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" placeholder="••••••" [(ngModel)]="contrasena" />
        </div>

        <button class="btn-primary" (click)="iniciarSesion()" [disabled]="cargando()">
          @if (cargando()) {
            Cargando...
          } @else {
            Entrar
          }
        </button>
      </div>
    }

    @if (tabActivo === 'registro') {
      <div class="login-body">
        @if (errorReg()) {
          <div class="form-error">{{ errorReg() }}</div>
        }
        @if (exitoReg()) {
          <div class="form-exito">{{ exitoReg() }}</div>
        }

        <div class="form-group">
          <label>Nombre completo</label>
          <input type="text" placeholder="Nombres y apellidos" [(ngModel)]="regNombre" />
        </div>
        <div class="form-group">
          <label>Correo electrónico</label>
          <input type="email" placeholder="correo@universidad.edu" [(ngModel)]="regEmail" />
        </div>
        <div class="form-group">
          <label>Nombre de usuario</label>
          <input type="text" placeholder="usuario" [(ngModel)]="regUsuario" />
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" placeholder="Mínimo 6 caracteres" [(ngModel)]="regContrasena" />
        </div>

        <button class="btn-primary" (click)="registrar()" [disabled]="cargando()">
          @if (cargando()) {
            Cargando...
          } @else {
            Crear cuenta
          }
        </button>
      </div>
    }
  </div>
</div>
