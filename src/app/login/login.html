<div class="login-bg">
  <div class="login-overlay"></div>

  <div class="login-card">
    <div class="login-card__header">
      <span class="login-card__icon">🍽️</span>
      <h1>ComeYa</h1>
      <p>Cafetería Universitaria</p>
    </div>

    <!-- Tabs -->
    <div class="login-tabs">
      <button
        class="login-tab"
        [class.active]="tabActivo === 'login'"
        (click)="tabActivo = 'login'"
      >
        Iniciar sesión
      </button>
      <button
        class="login-tab"
        [class.active]="tabActivo === 'registro'"
        (click)="tabActivo = 'registro'"
      >
        Registrarse
      </button>
    </div>

    <div class="login-card__body">

      <!-- LOGIN -->
      @if (tabActivo === 'login') {
        <div class="form-group">
          <label for="usuario">Usuario</label>
          <input id="usuario" type="text" [(ngModel)]="usuario"
            placeholder="Tu usuario" autocomplete="username" />
        </div>

        <div class="form-group">
          <label for="contrasena">Contraseña</label>
          <input id="contrasena" type="password" [(ngModel)]="contrasena"
            placeholder="Tu contraseña" autocomplete="current-password"
            (keyup.enter)="iniciarSesion()" />
        </div>

        @if (error()) {
          <p class="form-error">⚠️ {{ error() }}</p>
        }

        <button class="btn-primary" (click)="iniciarSesion()" [disabled]="cargando()">
          {{ cargando() ? 'Ingresando...' : '→ Ingresar' }}
        </button>
      }

      <!-- REGISTRO -->
      @if (tabActivo === 'registro') {
        <div class="form-group">
          <label>Nombre completo</label>
          <input type="text" [(ngModel)]="regNombre" placeholder="Tu nombre" />
        </div>

        <div class="form-group">
          <label>Correo institucional</label>
          <input type="email" [(ngModel)]="regEmail" placeholder="nombre@uni.edu.co" />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Usuario</label>
            <input type="text" [(ngModel)]="regUsuario" placeholder="usuario123" />
          </div>
          <div class="form-group">
            <label>Semestre</label>
            <input type="number" [(ngModel)]="regSemestre" placeholder="1-10" min="1" max="10" />
          </div>
        </div>

        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" [(ngModel)]="regContrasena" placeholder="Mínimo 6 caracteres" />
        </div>

        @if (errorReg()) {
          <p class="form-error">⚠️ {{ errorReg() }}</p>
        }
        @if (exitoReg()) {
          <p class="form-exito">✅ {{ exitoReg() }}</p>
        }

        <button class="btn-primary" (click)="registrar()" [disabled]="cargando()">
          {{ cargando() ? 'Registrando...' : '✓ Crear cuenta' }}
        </button>
      }

    </div>
  </div>
</div>
