<div class="login-page">
  <div class="login-brand">
    <span class="login-logo">🔑</span>
    <h1>Recuperar<br><em>Contraseña</em></h1>
    <p>ComeYa</p>
  </div>

  <div class="login-card">
    <div class="login-tabs">
      <a class="login-tab" routerLink="/login">Iniciar Sesión</a>
      <a class="login-tab active">Recuperar</a>
    </div>

    <div class="login-body">
      @if (error()) {
        <div class="form-error">{{ error() }}</div>
      }

      @if (exito()) {
        <div class="form-exito">{{ exito() }}</div>
      }

      <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" placeholder="correo@universidad.edu" [(ngModel)]="email" />
      </div>

      @if (step() === 'token') {
        <div class="form-group">
          <label>Token de recuperación</label>
          <input type="text" placeholder="Ingresa el token recibido" [(ngModel)]="token" />
        </div>

        <div class="form-group">
          <label>Nueva contraseña</label>
          <input type="password" placeholder="Mínimo 8 caracteres" [(ngModel)]="newPassword" />
        </div>

        <button class="btn-primary" (click)="restablecer()" [disabled]="cargando()">
          @if (cargando()) {
            Cargando...
          } @else {
            Cambiar contraseña
          }
        </button>
      } @else {
        <button class="btn-primary" (click)="solicitarToken()" [disabled]="cargando()">
          @if (cargando()) {
            Enviando...
          } @else {
            Enviar enlace
          }
        </button>
      }
    </div>
  </div>
</div>
