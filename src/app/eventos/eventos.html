<div class="section app-container">
  <h2 class="section-title">Eventos y Promociones</h2>

  @for (ev of eventos; track ev.titulo) {
    <div class="evento-card-full">
      <img [src]="ev.img" [alt]="ev.titulo">
      <div class="evento-body">
        <div class="evento-titulo">{{ ev.titulo }}</div>
        <div class="evento-desc">{{ ev.desc }}</div>
      </div>
    </div>
  }
</div>

<div class="page-spacer"></div>
